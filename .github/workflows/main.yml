name: Build and Release vdr-websocket-status project

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Update Version in package.json
        run: |
          npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version

      - name: Build Production Bundle
        run: npm run build

      - name: Create Release Archive
        run: |
          TAG=${{ github.ref_name }}
          ZIP_NAME="vue-osd-frontend-${TAG}.zip"
          zip -r "$ZIP_NAME" dist/
          echo "RELEASE_ZIP=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create a zip archive from the dist folder
        run: |
          cd dist
          zip -r ../vdr-websocket-status.zip .

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: vdr-websocket-status.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
